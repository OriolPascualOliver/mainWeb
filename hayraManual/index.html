function Placeholder({ label, width = "100%", height = 200, accent = "amber" }) {
  const colors = {
    amber: { stripe: "#c9913a22", border: "#c9913a55", text: "#9a6e28" },
    teal:  { stripe: "#3a9c9c22", border: "#3a9c9c55", text: "#2a7070" },
    green: { stripe: "#3a9c6022", border: "#3a9c6055", text: "#2a7048" },
  };
  const c = colors[accent] || colors.amber;
  return (
    <div style={{
      width, height, borderRadius: 12, border: `1.5px dashed ${c.border}`,
      background: `repeating-linear-gradient(135deg, transparent, transparent 8px, ${c.stripe} 8px, ${c.stripe} 16px)`,
      display: "flex", alignItems: "center", justifyContent: "center",
      flexDirection: "column", gap: 8,
    }}>
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="24" height="24" rx="4" stroke={c.border} strokeWidth="2" strokeDasharray="4 2"/>
        <path d="M8 20 L12 14 L16 17 L20 11" stroke={c.text} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="20" cy="8" r="2.5" stroke={c.text} strokeWidth="1.5"/>
      </svg>
      <span style={{ fontFamily: "monospace", fontSize: 11, color: c.text, textAlign: "center", lineHeight: 1.4, padding: "0 12px" }}>{label}</span>
    </div>
  );
}

            <PhoneMockup imageSrc={STEP_IMG["captive-manual"]}>
              <div style={{ background: "#f2f2f7", minHeight: 360 }}>
                <div style={{ background: "#fff", padding: "12px 16px 8px", borderBottom: "1px solid #e5e5e5" }}>
                  <div style={{ fontSize: 12, color: "#888", textAlign: "center" }}>9:41</div>
                </div>
                {/* Browser chrome */}
                <div style={{ background: "#fff", padding: "8px 10px", borderBottom: "1px solid #e5e5e5", display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ flex: 1, background: "#f2f2f7", borderRadius: 8, padding: "6px 10px", display: "flex", alignItems: "center", gap: 5 }}>
                    <span style={{ fontSize: 10, color: "#007AFF" }}>⌕</span>
                    <span style={{ fontSize: 12, color: "#333", fontFamily: "monospace", fontWeight: 600 }}>192.168.4.1</span>
                    <span style={{ fontSize: 10, color: "#4CAF50", marginLeft: "auto" }}>✓</span>
                  </div>
                </div>
                {/* Hayra page */}
                <div style={{ background: "oklch(97% 0.012 75)", padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ textAlign: "center", paddingBottom: 8, borderBottom: "1px solid oklch(88% 0.012 75)" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "oklch(18% 0.012 60)" }}>HAYRA</div>
                    <div style={{ fontSize: 9, color: "var(--text-muted)" }}>Feeder Control</div>
                  </div>
                  <div style={{ background: "#fff", borderRadius: 8, padding: "10px", boxShadow: "0 1px 4px #0001", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                    <div style={{ background: "oklch(93% 0.06 75)", borderRadius: 5, padding: "5px 10px", fontSize: 18, fontWeight: 700, color: "oklch(45% 0.14 60)", fontFamily: "monospace" }}>07</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "oklch(45% 0.14 60)" }}>:</div>
                    <div style={{ background: "oklch(93% 0.06 75)", borderRadius: 5, padding: "5px 10px", fontSize: 18, fontWeight: 700, color: "oklch(45% 0.14 60)", fontFamily: "monospace" }}>30</div>
                  </div>
                  <div style={{ background: "oklch(22% 0.005 60)", borderRadius: 7, padding: "8px", textAlign: "center", color: "#fff", fontSize: 12, fontWeight: 600 }}>Save</div>
                </div>
              </div>
            </PhoneMockup>
            <div style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "monospace", textAlign: "center", maxWidth: 120 }}>type in browser bar</div>
          </div>
        </div>
      </div>
    );
    case "browser": return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
        <PhoneMockup imageSrc={STEP_IMG["browser"]}>
          <BrowserScreen lang={lang}/>
        </PhoneMockup>
        <AndroidShortcutCard t={t}/>
      </div>
    );
    case "timepicker": return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
        <PhoneMockup imageSrc={STEP_IMG["timepicker"]}>
          <TimePickerScreen/>
        </PhoneMockup>
        <div style={{ fontSize: 11, color: "var(--text-muted)", fontStyle: "italic" }}>↑ Interactive demo — try it!</div>
      </div>
    );
    default: return null;
  }
}

// ── Main Step Card ─────────────────────────────────────────────────────────────
function StepCard({ step, index, total, lang, t, active, onActivate }) {
  const accentVars = {
    amber: { main: "var(--amber)", light: "var(--amber-light)", dark: "var(--amber-dark)" },
    teal:  { main: "var(--teal)", light: "var(--teal-light)", dark: "oklch(42% 0.14 200)" },
    green: { main: "var(--green)", light: "var(--green-light)", dark: "oklch(42% 0.14 145)" },
  };
  const ac = accentVars[step.accent] || accentVars.amber;

  const tipBorder = step.tipLabel === "Important" || step.tipLabel === "Importante" || step.tipLabel === "Important"
    ? "var(--amber)" : step.accent === "green" ? "var(--green)" : "var(--teal)";

  return (
    <div
      id={`step-${index}`}
      data-screen-label={`Step ${index + 1}`}
      style={{
        background: "#fff",
        borderRadius: 20,
        overflow: "hidden",
        boxShadow: active ? "0 8px 40px oklch(18% 0.012 60 / 0.12), 0 0 0 2px " + ac.main : "var(--shadow)",
        transition: "box-shadow 0.3s",
        cursor: active ? "default" : "pointer",
      }}
      onClick={() => !active && onActivate(index)}
    >
      {/* Step header */}
      <div style={{
        background: ac.light,
        padding: "20px 28px",
        display: "flex",
        alignItems: "center",
        gap: 16,
        borderBottom: `1.5px solid ${ac.main}44`,
      }}>
        <div style={{
          width: 52, height: 52, borderRadius: "50%",
          background: ac.main, color: "#fff",
          fontFamily: "'DM Serif Display', serif",
          fontSize: 20, fontWeight: 400,
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
          boxShadow: `0 4px 12px ${ac.main}55`,
        }}>{step.num}</div>
        <div>
          <div style={{ fontSize: 11, color: ac.dark, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>
            {t.stepLabel} {index + 1} {t.ofLabel} {total}
          </div>
          <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, color: "var(--text)", lineHeight: 1.2, marginTop: 2 }}>
            {step.title}
          </div>
        </div>
        {!active && (
          <div style={{ marginLeft: "auto", fontSize: 12, color: ac.dark, fontWeight: 500, display: "flex", alignItems: "center", gap: 4 }}>
            <span>expand</span>
            <span style={{ fontSize: 16 }}>↓</span>
          </div>
        )}
      </div>

      {/* Body (expanded) */}
      {active && (
        <div style={{ padding: "24px 28px", display: "flex", flexDirection: "column", gap: 20 }}>
          {/* Two-column on wide, single column on mobile (text first, image second) */}
          <div className="step-body-grid">
            <div className="step-text-col" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <p style={{ fontSize: 16, lineHeight: 1.75, color: "var(--text)", textWrap: "pretty" }}>{step.body}</p>
              {step.substeps && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {step.substeps.map((s, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                      <div style={{
                        width: 24, height: 24, borderRadius: "50%", background: ac.main, color: "#fff",
                        fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                      }}>{i + 1}</div>
                      <span style={{ fontSize: 13, lineHeight: 1.6, paddingTop: 3 }}>{s.label}</span>
                    </div>
                  ))}
                </div>
              )}
              {step.buttonActions && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-muted)", marginBottom: 2 }}>Button reference</div>
                  <ButtonBehaviorCard actions={step.buttonActions}/>
                </div>
              )}
              <div style={{
                background: step.accent === "amber" ? "oklch(96% 0.03 68)" : step.accent === "green" ? "oklch(96% 0.03 145)" : "oklch(96% 0.03 200)",
                borderLeft: `3px solid ${ac.main}`,
                borderRadius: "0 10px 10px 0",
                padding: "12px 16px",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: ac.dark, marginBottom: 4 }}>{step.tipLabel}</div>
                <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6 }}>{step.tip}</div>
              </div>
            </div>
            <div className="step-visual-col">
              <StepVisual visual={step.visual} step={step} lang={lang} t={t}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Progress Nav ───────────────────────────────────────────────────────────────
function ProgressBar({ steps, active, onSelect, t }) {
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", justifyContent: "center" }}>
      {steps.map((s, i) => (
        <button
          key={i}
          onClick={() => onSelect(i)}
          style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 20, border: "none", cursor: "pointer", transition: "all 0.2s",
            background: i === active ? "var(--amber)" : i < active ? "oklch(88% 0.06 75)" : "var(--bg2)",
            color: i === active ? "#fff" : i < active ? "oklch(45% 0.1 68)" : "var(--text-muted)",
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 12, fontWeight: i === active ? 600 : 400,
          }}
        >
          {i < active && <span>✓</span>}
          <span>{i + 1}. {s.short}</span>
        </button>
      ))}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const savedLang = localStorage.getItem("hayra_lang") || "en";
  const savedStep = parseInt(localStorage.getItem("hayra_step") || "0");

  const [lang, setLang] = useState(savedLang);
  const [activeStep, setActiveStep] = useState(savedStep);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  const t = T[lang];

  useEffect(() => {
    localStorage.setItem("hayra_lang", lang);
  }, [lang]);
  useEffect(() => {
    localStorage.setItem("hayra_step", activeStep);
  }, [activeStep]);

  // Tweaks integration
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const handleActivate = (i) => {
    setActiveStep(i);
    setTimeout(() => {
      const el = document.getElementById(`step-${i}`);
      if (el) el.scrollIntoView ? null : (document.documentElement.scrollTop = el.offsetTop - 80);
    }, 50);
  };

  const allComplete = activeStep >= t.steps.length;

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Header */}
      <header style={{
        position: "sticky", top: 0, zIndex: 100,
        background: "oklch(97% 0.012 75 / 0.95)",
        backdropFilter: "blur(12px)",
        borderBottom: "1px solid var(--border)",
        padding: "0 24px",
      }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <img src={window.__resources && window.__resources.hayraLogo || "HayraLogo.svg"} alt="Hayra" style={{ height: 28, filter: "brightness(0)" }}/>
            <span style={{ fontSize: 12, color: "var(--text-muted)", borderLeft: "1px solid var(--border)", paddingLeft: 10 }}>{t.tagline}</span>
          </div>
          {/* Lang switcher */}
          <div style={{ display: "flex", gap: 4, background: "var(--bg2)", borderRadius: 20, padding: 3 }}>
            {["en","es","ca"].map(l => (
              <button key={l} onClick={() => setLang(l)} style={{
                background: lang === l ? "#fff" : "transparent",
                border: "none", borderRadius: 16, padding: "4px 10px",
                fontSize: 12, fontWeight: lang === l ? 600 : 400,
                cursor: "pointer", color: lang === l ? "var(--text)" : "var(--text-muted)",
                boxShadow: lang === l ? "0 1px 4px #0001" : "none",
                transition: "all 0.2s",
                fontFamily: "'DM Sans', sans-serif",
              }}>{l.toUpperCase()}</button>
            ))}
          </div>
        </div>
      </header>

      {/* Hero */}
      <div style={{ background: "oklch(22% 0.005 60)", padding: "48px 24px 40px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 12 }}>
            <div>
              <img src={window.__resources && window.__resources.hayraLogo || "HayraLogo.svg"} alt="Hayra" style={{ height: 32, filter: "brightness(0) invert(1)", display: "block" }}/>
              <h1 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 18, color: "oklch(75% 0.012 60)", lineHeight: 1.3, marginTop: 4 }}>{t.guideTitle}</h1>
            </div>
          </div>
          <p style={{ fontSize: 15, color: "oklch(75% 0.012 60)", maxWidth: 520, lineHeight: 1.7 }}>{t.guideSub}</p>
          <div style={{ marginTop: 24 }}>
            <ProgressBar steps={t.steps} active={activeStep} onSelect={handleActivate} t={t}/>
          </div>
        </div>
      </div>

      {/* Steps */}
      <main style={{ maxWidth: 900, margin: "0 auto", padding: "32px 24px", display: "flex", flexDirection: "column", gap: 16 }}>
        {t.steps.map((step, i) => (
          <StepCard
            key={i}
            step={step}
            index={i}
            total={t.steps.length}
            lang={lang}
            t={t}
            active={activeStep === i}
            onActivate={handleActivate}
          />
        ))}

        {/* Navigation */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0 16px" }}>
          <button
            onClick={() => handleActivate(Math.max(0, activeStep - 1))}
            disabled={activeStep === 0}
            style={{
              background: "var(--bg2)", border: "none", borderRadius: 10, padding: "10px 20px",
              fontSize: 14, cursor: activeStep === 0 ? "not-allowed" : "pointer",
              color: activeStep === 0 ? "var(--text-muted)" : "var(--text)",
              fontFamily: "'DM Sans', sans-serif", fontWeight: 500,
            }}
          >{t.prevStep}</button>
          {activeStep < t.steps.length - 1
            ? <button
                onClick={() => handleActivate(activeStep + 1)}
                style={{
                  background: "var(--amber)", color: "#fff", border: "none", borderRadius: 10, padding: "10px 24px",
                  fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                  boxShadow: "0 4px 14px var(--amber)55",
                }}
              >{t.nextStep}</button>
            : <button
                onClick={() => handleActivate(t.steps.length)}
                style={{
                  background: "var(--green)", color: "#fff", border: "none", borderRadius: 10, padding: "10px 24px",
                  fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                  boxShadow: "0 4px 14px var(--green)55",
                }}
              >✓ {t.allDone}</button>
          }
        </div>

        {/* All done */}
        {allComplete && (
          <div style={{
            background: "oklch(22% 0.005 60)", borderRadius: 20, padding: "32px 28px", textAlign: "center",
            boxShadow: "var(--shadow-lg)",
          }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎉</div>
            <h2 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 28, color: "#fff", marginBottom: 8 }}>{t.allDone}</h2>
            <p style={{ fontSize: 15, color: "oklch(75% 0.012 60)", maxWidth: 420, margin: "0 auto" }}>{t.allDoneSub}</p>
          </div>
        )}

        {/* Help footer */}
        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 24, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <span style={{ fontSize: 14, color: "var(--text-muted)" }}>{t.needHelp}</span>
          <a href="mailto:support@hayra.com" style={{
            background: "var(--bg2)", color: "var(--text)", textDecoration: "none",
            padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500,
          }}>{t.contact} →</a>
        </div>
      </main>

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{
          position: "fixed", bottom: 24, right: 24, width: 260,
          background: "#fff", borderRadius: 16, padding: 20, boxShadow: "var(--shadow-lg)",
          border: "1px solid var(--border)", zIndex: 9999,
          fontFamily: "'DM Sans', sans-serif",
        }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>Tweaks</div>
          <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, fontSize: 13 }}>
            Show tips
            <input type="checkbox" checked={tweaks.showTips} onChange={e => {
              const v = { ...tweaks, showTips: e.target.checked };
              setTweaks(v);
              window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { showTips: e.target.checked } }, "*");
            }}/>
          </label>
          <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, fontSize: 13 }}>
            Compact mode
            <input type="checkbox" checked={tweaks.compactMode} onChange={e => {
              const v = { ...tweaks, compactMode: e.target.checked };
              setTweaks(v);
              window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { compactMode: e.target.checked } }, "*");
            }}/>
          </label>
          <label style={{ display: "block", fontSize: 13, marginBottom: 4 }}>Accent color</label>
          <input type="color" value={tweaks.accentColor} style={{ width: "100%", height: 32, borderRadius: 6, border: "1px solid var(--border)", cursor: "pointer" }}
            onChange={e => {
              const v = { ...tweaks, accentColor: e.target.value };
              setTweaks(v);
              window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { accentColor: e.target.value } }, "*");
            }}
          />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
